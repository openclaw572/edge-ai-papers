<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 論文報告</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 側欄：日期分類 -->
        <aside class="sidebar">
            <h1>📚 Edge AI 論文</h1>
            <nav id="date-nav">
                <!-- 日期列表會由 JS 動態載入 -->
            </nav>
        </aside>

        <!-- 主內容區 -->
        <main class="main-content">
            <header>
                <h2 id="page-title">選擇日期查看論文報告</h2>
            </header>
            
            <div id="content-area">
                <!-- 內容會由 JS 動態載入 -->
                <div class="welcome-message">
                    <p>👈 請從側欄選擇一個日期</p>
                    <p>每個日期包含兩篇論文報告：</p>
                    <ul>
                        <li>Edge AI 相關論文</li>
                        <li>Edge AI 安全相關論文</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
