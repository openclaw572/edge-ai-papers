<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI 論文報告</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>📚 Edge AI 論文</h1>

            <div class="category-switch" id="category-switch">
                <button class="category-btn active" data-category="review">Review Paper</button>
                <button class="category-btn" data-category="general">General Paper</button>
            </div>

            <p id="category-hint" class="category-hint">請先選擇分類，再選擇日期</p>

            <nav id="date-nav">
                <!-- 日期列表由 JS 動態載入 -->
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h2 id="page-title">先選擇分類，再選擇日期查看報告</h2>
            </header>

            <div id="content-area">
                <div class="welcome-message">
                    <p>👈 請先在側欄選擇論文分類（Review / General），再選擇日期。</p>
                    <p>每個日期會顯示該分類底下的論文報告。</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
